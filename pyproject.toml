[project]
name = "silicon-realms"
version = "0.1.0"
description = "Three-realm agent civilization with token economics"
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0", "matplotlib>=3.7"]

[project.scripts]
silicon-realms = "silicon_realms.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
